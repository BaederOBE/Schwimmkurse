<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schwimmkurse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Schwimmkurse</h1>
    <p>Finde deinen passenden Kurs</p>
</header>

<main>

<section id="kurseContainer">
    <h2>Verfügbare Kurse</h2>
    <div id="kurse"></div>
</section>

<section>
    <h2>Downloads</h2>
    <a class="button" href="anmeldung.pdf" download>📄 Anmeldung</a>
    <a class="button" href="infos.pdf" download>📄 Infos</a>
</section>

<section>
    <h2>Anmeldung</h2>
    <p>E-Mail kopieren:</p>
    <input type="text" value="deine@email.de" id="email" readonly>
    <button onclick="kopieren()">Kopieren</button>

    <br><br>

    <a class="button" href="mailto:deine@email.de?subject=Anmeldung Schwimmkurs">
        📧 E-Mail öffnen
    </a>
</section>

</main>

<footer>
    © Schwimmkurse
</footer>

<script>
fetch('kurse.json')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('kurse');

        data.forEach(kurs => {
            const div = document.createElement('div');
            div.classList.add('kurs');

            div.innerHTML = `
                <h3>${kurs.name}</h3>
                <p><b>Ort:</b> ${kurs.ort}</p>
                <p><b>Datum:</b> ${kurs.datum}</p>
                <p><b>Zeiten:</b> ${kurs.zeiten}</p>
                <p><b>Preis:</b> ${kurs.preis}</p>
                <p><b>Plätze:</b> ${kurs.plaetze}</p>
            `;

            container.appendChild(div);
        });
    });

function kopieren() {
    var copyText = document.getElementById("email");
    copyText.select();
    document.execCommand("copy");
    alert("E-Mail kopiert!");
}
</script>

</body>
</html>
